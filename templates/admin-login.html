<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sentrix</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>

</head>
<body>

    <div class="login-layout">
        <div class="login-card">
            
            <div class="brand-header">
                <div class="brand-icon">
                    <i data-lucide="shield-alert"></i>
                </div>
                <h1 class="login-title">Sentrix Admin</h1>
                <p class="login-desc">Sign in to access the threat intelligence dashboard</p>
            </div>

            <div class="space-y-4 text-center">
                <p class="text-sm text-muted mb-6">Authentication is handled securely via IBM Cloud App ID.</p>
                <a href="/api/auth/login" class="btn btn-primary w-full" style="height: 3rem; display: flex; align-items: center; justify-content: center; text-decoration: none;">
                    <i data-lucide="lock" style="width: 18px; margin-right: 8px;"></i> Login with IBM App ID
                </a>
            </div>

            <div class="mt-6 text-center text-xs text-muted" style="border-top: 1px solid var(--border); padding-top: 1rem;">
                <p>Protected by IBM App ID Authentication</p>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
